<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDMS - Endpoint Data Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .spinner {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #3498db;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="app">
        <!-- Header -->
        <header class="bg-white shadow-sm border-b">
            <div class="max-w-7xl mx-auto px-4 py-4">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-2xl font-bold text-gray-900">EDMS</h1>
                        <p class="text-sm text-gray-500">Endpoint Data Management System</p>
                    </div>
                    <div class="flex gap-4" id="connection-status">
                        <!-- Filled by JS -->
                    </div>
                </div>
            </div>
        </header>

        <div class="max-w-7xl mx-auto px-4 py-6">
            <div class="grid grid-cols-12 gap-6">
                <!-- Left Panel -->
                <div class="col-span-4">
                    <div class="bg-white rounded-lg shadow">
                        <div class="border-b">
                            <div class="flex">
                                <button onclick="switchTab('endpoints')" id="tab-endpoints" class="flex-1 px-4 py-3 text-sm font-medium border-b-2 border-blue-500 text-blue-600">
                                    Endpoints <span id="count-endpoints" class="ml-2 text-xs bg-gray-100 px-2 py-0.5 rounded-full">0</span>
                                </button>
                                <button onclick="switchTab('bookmarks')" id="tab-bookmarks" class="flex-1 px-4 py-3 text-sm font-medium text-gray-500 hover:text-gray-700">
                                    Bookmarks <span id="count-bookmarks" class="ml-2 text-xs bg-gray-100 px-2 py-0.5 rounded-full">0</span>
                                </button>
                                <button onclick="switchTab('history')" id="tab-history" class="flex-1 px-4 py-3 text-sm font-medium text-gray-500 hover:text-gray-700">
                                    History <span id="count-history" class="ml-2 text-xs bg-gray-100 px-2 py-0.5 rounded-full">0</span>
                                </button>
                            </div>
                        </div>
                        <div id="list-container" class="max-h-96 overflow-y-auto">
                            <!-- Filled by JS -->
                        </div>
                    </div>
                </div>

                <!-- Center Panel -->
                <div class="col-span-5">
                    <div class="bg-white rounded-lg shadow">
                        <div class="p-4 border-b">
                            <h2 class="font-semibold text-gray-900">Request Builder</h2>
                        </div>
                        <div id="request-builder" class="p-4">
                            <div class="text-center text-gray-400 py-8">
                                Select an endpoint to get started
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right Panel -->
                <div class="col-span-3">
                    <div class="bg-white rounded-lg shadow">
                        <div class="p-4 border-b flex items-center justify-between">
                            <h2 class="font-semibold text-gray-900">Event Log</h2>
                            <button onclick="clearEvents()" class="text-xs text-gray-500 hover:text-gray-700">Clear</button>
                        </div>
                        <div id="event-log" class="max-h-[500px] overflow-y-auto">
                            <div class="p-4 text-center text-gray-400 text-sm">No events yet</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Stats -->
            <div class="mt-6 grid grid-cols-4 gap-4" id="stats">
                <!-- Filled by JS -->
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const API_BASE = 'http://localhost:3000';
        const WS_BASE = 'ws://localhost:3000';

        // State
        let endpoints = [];
        let bookmarks = [];
        let history = [];
        let events = [];
        let runningTests = new Set();
        let selectedEndpoint = null;
        let activeTab = 'endpoints';
        let method = 'GET';

        // WebSocket connections
        let endpointsWs = null;
        let bookmarksWs = null;
        let runWs = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            connectWebSockets();
            updateStats();
        });

        // WebSocket connections
        function connectWebSockets() {
            // Endpoints WS
            endpointsWs = new WebSocket(`${WS_BASE}/test-view/endpoints/load`);
            endpointsWs.onopen = () => {
                updateConnectionStatus('endpoints', true);
                addEvent('connection', 'Endpoints WS connected');
            };
            endpointsWs.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.type === 'snapshot') {
                    endpoints = data.endpoints || [];
                    addEvent('snapshot', `Loaded ${endpoints.length} endpoints`);
                    if (activeTab === 'endpoints') renderList();
                    updateStats();
                } else if (data.type === 'event') {
                    handleServerEvent(data.event);
                }
            };
            endpointsWs.onclose = () => {
                updateConnectionStatus('endpoints', false);
                setTimeout(() => connectWebSockets(), 3000);
            };

            // Bookmarks WS
            bookmarksWs = new WebSocket(`${WS_BASE}/test-view/bookmarks/load`);
            bookmarksWs.onopen = () => {
                updateConnectionStatus('bookmarks', true);
                addEvent('connection', 'Bookmarks WS connected');
            };
            bookmarksWs.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.type === 'snapshot') {
                    bookmarks = data.bookmarks || [];
                    addEvent('snapshot', `Loaded ${bookmarks.length} bookmarks`);
                    if (activeTab === 'bookmarks') renderList();
                    updateStats();
                } else if (data.type === 'event') {
                    handleServerEvent(data.event);
                }
            };
            bookmarksWs.onclose = () => {
                updateConnectionStatus('bookmarks', false);
            };

            // Run WS
            runWs = new WebSocket(`${WS_BASE}/test-view/run`);
            runWs.onopen = () => {
                updateConnectionStatus('run', true);
                addEvent('connection', 'Run WS connected');
            };
            runWs.onmessage = (e) => {
                const data = JSON.parse(e.data);
                addEvent('run', JSON.stringify(data));
                if (data.type === 'event') {
                    handleServerEvent(data.event);
                }
            };
            runWs.onclose = () => {
                updateConnectionStatus('run', false);
            };
        }

        function handleServerEvent(event) {
            if (!event) return;
            
            if (event.type === 'TestStarted') {
                runningTests.add(event.payload.endpoint_id);
                renderList();
                updateStats();
            } else if (event.type === 'TestFinished') {
                runningTests.delete(event.payload.endpoint_id);
                history.unshift({
                    endpoint_id: event.payload.endpoint_id,
                    status_code: event.payload.status_code,
                    response_time_ms: event.payload.response_time_ms,
                    timestamp: new Date().toISOString()
                });
                history = history.slice(0, 100);
                renderList();
                updateStats();
                
                if (selectedEndpoint && selectedEndpoint.endpoint_id === event.payload.endpoint_id) {
                    renderRequestBuilder();
                }
            } else if (event.type === 'TestTimeout') {
                runningTests.delete(event.payload.endpoint_id);
                renderList();
                updateStats();
            }
        }

        function updateConnectionStatus(name, connected) {
            const container = document.getElementById('connection-status');
            const existing = document.getElementById(`conn-${name}`);
            
            const html = `
                <div id="conn-${name}" class="flex items-center gap-2 text-sm">
                    <div class="w-2 h-2 rounded-full ${connected ? 'bg-green-500' : 'bg-red-500'}"></div>
                    <span class="text-gray-600">${name.charAt(0).toUpperCase() + name.slice(1)}</span>
                </div>
            `;
            
            if (existing) {
                existing.outerHTML = html;
            } else {
                container.innerHTML += html;
            }
        }

        function switchTab(tab) {
            activeTab = tab;
            
            ['endpoints', 'bookmarks', 'history'].forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                if (t === tab) {
                    btn.className = 'flex-1 px-4 py-3 text-sm font-medium border-b-2 border-blue-500 text-blue-600';
                } else {
                    btn.className = 'flex-1 px-4 py-3 text-sm font-medium text-gray-500 hover:text-gray-700';
                }
            });
            
            renderList();
        }

        function renderList() {
            const container = document.getElementById('list-container');
            let items = [];
            
            if (activeTab === 'endpoints') {
                items = endpoints;
            } else if (activeTab === 'bookmarks') {
                items = bookmarks;
            } else {
                // History
                if (history.length === 0) {
                    container.innerHTML = '<div class="p-8 text-center text-gray-400 text-sm">No history yet</div>';
                    return;
                }
                
                let html = `<button onclick="clearHistory()" class="w-full p-2 text-xs text-red-600 hover:bg-red-50 border-b">Clear History</button>`;
                history.forEach((h, i) => {
                    const statusColor = h.status_code >= 200 && h.status_code < 300 ? 'bg-green-500' 
                        : h.status_code >= 400 && h.status_code < 500 ? 'bg-yellow-500' 
                        : 'bg-red-500';
                    html += `
                        <div class="p-3 border-b">
                            <div class="flex items-center justify-between">
                                <div class="font-medium text-sm truncate">${h.endpoint_id}</div>
                                <span class="${statusColor} text-white text-xs px-2 py-1 rounded font-mono">${h.status_code}</span>
                            </div>
                            <div class="text-xs text-gray-500 mt-1">
                                ${h.response_time_ms}ms • ${new Date(h.timestamp).toLocaleTimeString()}
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
                return;
            }
            
            if (items.length === 0) {
                container.innerHTML = `<div class="p-8 text-center text-gray-400 text-sm">No ${activeTab} yet</div>`;
                return;
            }
            
            let html = '';
            items.forEach(ep => {
                const isSelected = selectedEndpoint && selectedEndpoint.endpoint_id === ep.endpoint_id;
                const isRunning = runningTests.has(ep.endpoint_id);
                
                html += `
                    <div onclick="selectEndpoint('${ep.endpoint_id}')" 
                         class="p-3 border-b cursor-pointer hover:bg-gray-50 ${isSelected ? 'bg-blue-50' : ''}">
                        <div class="flex items-center justify-between">
                            <div class="font-medium text-sm truncate">${ep.endpoint_id}</div>
                            ${isRunning ? '<div class="spinner"></div>' : ''}
                        </div>
                        <div class="text-xs text-gray-500 truncate">${ep.endpoint_str}</div>
                        ${ep.annotation ? `<div class="text-xs text-gray-400 mt-1">${ep.annotation}</div>` : ''}
                    </div>
                `;
            });
            container.innerHTML = html;
            
            // Update counts
            document.getElementById('count-endpoints').textContent = endpoints.length;
            document.getElementById('count-bookmarks').textContent = bookmarks.length;
            document.getElementById('count-history').textContent = history.length;
        }

        function selectEndpoint(id) {
            const allEndpoints = [...endpoints, ...bookmarks];
            selectedEndpoint = allEndpoints.find(e => e.endpoint_id === id);
            renderList();
            renderRequestBuilder();
        }

        function renderRequestBuilder() {
            const container = document.getElementById('request-builder');
            
            if (!selectedEndpoint) {
                container.innerHTML = '<div class="text-center text-gray-400 py-8">Select an endpoint to get started</div>';
                return;
            }
            
            const isRunning = runningTests.has(selectedEndpoint.endpoint_id);
            const lastResult = history.find(h => h.endpoint_id === selectedEndpoint.endpoint_id);
            
            container.innerHTML = `
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">Endpoint ID</label>
                        <div class="font-mono text-sm bg-gray-50 p-2 rounded">${selectedEndpoint.endpoint_id}</div>
                    </div>
                    
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">URL</label>
                        <div class="font-mono text-sm bg-gray-50 p-2 rounded break-all">${selectedEndpoint.endpoint_str}</div>
                    </div>

                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">Method</label>
                        <div class="flex gap-2">
                            ${['GET', 'POST', 'PUT', 'DELETE'].map(m => `
                                <button onclick="setMethod('${m}')" 
                                    class="px-3 py-1.5 text-sm font-medium rounded ${method === m ? 'bg-blue-500 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}">
                                    ${m}
                                </button>
                            `).join('')}
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">Request Body (JSON)</label>
                        <textarea id="request-body" 
                            class="w-full h-32 font-mono text-sm p-2 border rounded focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                            placeholder='{"key": "value"}'>{}</textarea>
                    </div>

                    <div class="flex gap-2">
                        <button onclick="runTest()" 
                            ${isRunning ? 'disabled' : ''}
                            class="flex-1 bg-blue-500 text-white py-2 px-4 rounded font-medium hover:bg-blue-600 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                            ${isRunning ? '<div class="spinner"></div> Running...' : 'Run Test'}
                        </button>
                        <button onclick="saveBookmark()" 
                            class="bg-gray-100 text-gray-700 py-2 px-4 rounded font-medium hover:bg-gray-200">
                            Bookmark
                        </button>
                    </div>

                    ${lastResult ? `
                        <div class="mt-4 p-3 bg-gray-50 rounded">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-xs font-medium text-gray-500">Last Response</span>
                                <span class="${lastResult.status_code >= 200 && lastResult.status_code < 300 ? 'bg-green-500' : 'bg-red-500'} text-white text-xs px-2 py-1 rounded font-mono">${lastResult.status_code}</span>
                            </div>
                            <div class="text-sm text-gray-600">Response time: ${lastResult.response_time_ms}ms</div>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function setMethod(m) {
            method = m;
            renderRequestBuilder();
        }

        function runTest() {
            if (!selectedEndpoint || !runWs || runWs.readyState !== WebSocket.OPEN) {
                addEvent('error', 'Cannot run test - not connected');
                return;
            }
            
            let requestBody = {};
            try {
                requestBody = JSON.parse(document.getElementById('request-body').value || '{}');
            } catch (e) {
                addEvent('error', 'Invalid JSON in request body');
                return;
            }
            
            const message = {
                type: 'Run',
                payload: {
                    endpoint_id: selectedEndpoint.endpoint_id,
                    method: method,
                    request_json: requestBody,
                    timeout_ms: 30000,
                    notify_only: false
                }
            };
            
            runWs.send(JSON.stringify(message));
            addEvent('send', `Running test: ${selectedEndpoint.endpoint_id}`);
        }

        async function saveBookmark() {
            if (!selectedEndpoint) return;
            
            try {
                const res = await fetch(`${API_BASE}/test-view/save/bookmark`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ endpoint_id: selectedEndpoint.endpoint_id, notes: null })
                });
                const data = await res.json();
                addEvent('bookmark', `Bookmarked: ${selectedEndpoint.endpoint_id}`);
            } catch (e) {
                addEvent('error', `Bookmark failed: ${e.message}`);
            }
        }

        async function clearHistory() {
            try {
                await fetch(`${API_BASE}/test-view/history/clearall`, { method: 'POST' });
                history = [];
                renderList();
                addEvent('clear', 'History cleared');
            } catch (e) {
                addEvent('error', `Clear failed: ${e.message}`);
            }
        }

        function addEvent(type, message) {
            const event = {
                id: Date.now(),
                time: new Date().toLocaleTimeString(),
                type,
                message
            };
            events.unshift(event);
            events = events.slice(0, 50);
            renderEvents();
        }

        function renderEvents() {
            const container = document.getElementById('event-log');
            
            if (events.length === 0) {
                container.innerHTML = '<div class="p-4 text-center text-gray-400 text-sm">No events yet</div>';
                return;
            }
            
            container.innerHTML = events.map(evt => {
                const typeColors = {
                    error: 'bg-red-100 text-red-700',
                    connection: 'bg-green-100 text-green-700',
                    snapshot: 'bg-blue-100 text-blue-700',
                    default: 'bg-gray-100 text-gray-700'
                };
                const colorClass = typeColors[evt.type] || typeColors.default;
                
                return `
                    <div class="p-2 border-b text-xs">
                        <div class="flex items-center gap-2">
                            <span class="text-gray-400">${evt.time}</span>
                            <span class="px-1.5 py-0.5 rounded text-xs ${colorClass}">${evt.type}</span>
                        </div>
                        <div class="text-gray-600 mt-1 break-all font-mono">${evt.message}</div>
                    </div>
                `;
            }).join('');
        }

        function clearEvents() {
            events = [];
            renderEvents();
        }

        function updateStats() {
            document.getElementById('stats').innerHTML = `
                <div class="bg-white rounded-lg shadow p-4">
                    <div class="text-2xl font-bold text-gray-900">${endpoints.length}</div>
                    <div class="text-sm text-gray-500">Total Endpoints</div>
                </div>
                <div class="bg-white rounded-lg shadow p-4">
                    <div class="text-2xl font-bold text-gray-900">${bookmarks.length}</div>
                    <div class="text-sm text-gray-500">Bookmarks</div>
                </div>
                <div class="bg-white rounded-lg shadow p-4">
                    <div class="text-2xl font-bold text-gray-900">${history.length}</div>
                    <div class="text-sm text-gray-500">Tests Run</div>
                </div>
                <div class="bg-white rounded-lg shadow p-4">
                    <div class="text-2xl font-bold text-gray-900">${runningTests.size}</div>
                    <div class="text-sm text-gray-500">Running Now</div>
                </div>
            `;
        }
    </script>
</body>
</html>
